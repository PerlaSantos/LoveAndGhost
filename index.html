<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoveAndGhost - Iniciar Sesión</title>
    <style>
        /* ========== RESET Y ESTILOS GENERALES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a1a;
            overflow: hidden;
        }

        /* ========== CARRUSEL DE FONDO ========== */
        .carousel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            background-size: cover;
            background-position: center;
            filter: brightness(0.35) blur(2px);
        }

        .carousel-slide.active {
            opacity: 1;
        }

        /* ========== CONTENEDOR PRINCIPAL ========== */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* ========== TARJETA DEL LOGIN ========== */
        .login-card {
            background: rgba(10, 10, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 35px;
            box-shadow: 
                0 20px 60px rgba(138, 43, 226, 0.3),
                0 0 40px rgba(0, 150, 255, 0.1),
                inset 0 0 80px rgba(255, 0, 200, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ========== LOGO Y TÍTULO ========== */
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff69b4, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.3);
        }

        .logo .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .logo .ghost-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.4));
        }

        /* ========== CAMPOS DEL FORMULARIO ========== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        /* ========== BOTÓN ========== */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff69b4, #8b5cf6, #3b82f6);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5);
        }

        .btn-login:active {
            transform: translateY(0px);
        }

        /* ========== MENSAJES ========== */
        #mensaje {
            margin-top: 20px;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: center;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
        }

        #mensaje.error {
            background: rgba(255, 0, 0, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        #mensaje.success {
            background: rgba(0, 255, 200, 0.1);
            color: #4ade80;
            border: 1px solid rgba(0, 255, 200, 0.15);
        }

        /* ========== FOOTER ========== */
        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        .footer-text .danger {
            color: rgba(255, 100, 100, 0.3);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            .logo h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- ====== CARRUSEL DE FONDO ====== -->
    <div class="carousel" id="carousel">
        <div class="carousel-slide active" style="background-image: url('https://butwhytho.net/wp-content/uploads/2025/08/Love-and-Deepspace-Characters-But-Why-Tho.jpg');"></div>
        <div class="carousel-slide" style="background-image: url('https://kotaku.com/app/uploads/2026/04/Love-And-Deepspace-Lingering-Lust.jpeg');"></div>
        <div class="carousel-slide" style="background-image: url('https://otomekitten.com/wp-content/uploads/2025/10/lads06.png?w=904');"></div>
        <div class="carousel-slide" style="background-image: url('https://images.genius.com/c46887c01609dd94ae040a4fbca81cd2.1000x525x1.webp');"></div>
        <div class="carousel-slide" style="background-image: url('https://r.res.easebar.com/pic/20231218/4871e778-68a9-4287-b771-ccbe021d89a8.jpg');"></div>
    </div>

    <!-- ====== CONTENEDOR PRINCIPAL ====== -->
    <div class="container">
        <div class="login-card">

            <!-- ====== LOGO ====== -->
            <div class="logo">
                <h1> LoveAndGhost </h1>
                <div class="subtitle"> Donde el amor trasciende </div>
            </div>

            <!-- ====== FORMULARIO ====== -->
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="usuario"> Usuario </label>
                    <input 
                        type="text" 
                        id="usuario" 
                        placeholder="Ingresa tu usuario..." 
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="contrasena"> Contraseña </label>
                    <input 
                        type="password" 
                        id="contrasena" 
                        placeholder="Ingresa tu contraseña..." 
                        required
                    />
                </div>

                <button type="submit" class="btn-login"> Conectar almas... </button>
            </form>

            <!-- ====== MENSAJE DE RESPUESTA ====== -->
            <div id="mensaje">
                 Ingresar
            </div>

       

        </div>
    </div>

    <!-- ========================================================= -->
    <!-- ====== JAVASCRIPT (CON VULNERABILIDAD SQL INJECTION) ===== -->
    <!-- ========================================================= -->
    <script>
        // =====================================================
        // 1. CARRUSEL AUTOMÁTICO
        // =====================================================
        (function carrusel() {
            const slides = document.querySelectorAll('.carousel-slide');
            let current = 0;

            function cambiarSlide() {
                slides.forEach(s => s.classList.remove('active'));
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }

            // Cambiar cada 5 segundos
            setInterval(cambiarSlide, 5000);
        })();

        // =====================================================
        // 2. "BASE DE DATOS" SIMULADA (objeto en memoria)
        //    Esto representa una tabla de usuarios en SQL
        // =====================================================
        const baseDeDatos = [
            { id: 1, usuario: 'rafael', contrasena: 'deepspace123', nombre: 'Rafael' },
            { id: 2, usuario: 'xavier', contrasena: 'stars2024', nombre: 'Xavier' },
            { id: 3, usuario: 'zayne', contrasena: 'frostbite', nombre: 'Zayne' },
            { id: 4, usuario: 'sylus', contrasena: 'dragonheart', nombre: 'Sylus' },
            { id: 5, usuario: 'caledon', contrasena: 'eternallove', nombre: 'Caledon' },
            // Usuario extra para demostración
            { id: 6, usuario: 'admin', contrasena: 'admin123', nombre: 'Administrador' },
        ];

        // =====================================================
        // 3. FUNCIÓN DE LOGIN CON VULNERABILIDAD SQL INJECTION
        //    ¡IMPORTANTE! Esto es lo que el profesor quiere ver.
        //    Estamos simulando una consulta SQL vulnerable.
        // =====================================================
        function loginVulnerable(usuarioInput, contrasenaInput) {
            // 🔴 ¡VULNERABILIDAD! Esto simula concatenar texto del usuario
            // directamente en una consulta SQL sin filtrar.
            //
            // En una BD real, la consulta sería algo como:
            // "SELECT * FROM usuarios WHERE usuario = '" + usuarioInput + "' AND contrasena = '" + contrasenaInput + "'"
            //
            // Nosotros lo simulamos con un filter() y eval() para que se comporte igual.
            // ¡NUNCA hagas esto en código real!

            try {
                // Convertimos el input del usuario en una expresión que podamos evaluar
                // Esto reproduce el efecto de la inyección SQL.
                // 
                // EJEMPLO: Si el usuario escribe:  ' OR '1'='1
                // La condición se convierte en:  usuario === '' OR '1' === '1'
                // que SIEMPRE es verdadero.
                const usuarioCond = usuarioInput.replace(/'/g, '"'); // simple reemplazo para evitar errores
                const contrasenaCond = contrasenaInput.replace(/'/g, '"');

                // Construimos una función que evalúa la condición simulando SQL
                // Esta es la parte "vulnerable" que permite la inyección
                const fn = new Function(
                    'usuario',
                    'contrasena',
                    `return (usuario === ${usuarioCond}) && (contrasena === ${contrasenaCond});`
                );

                // Buscamos el primer usuario que cumpla la condición
                const resultado = baseDeDatos.find(user => fn(user.usuario, user.contrasena));

                return resultado || null;

            } catch (e) {
                // Si hay error en la inyección, lo atrapamos para no romper la demo
                return null;
            }
        }

        // =====================================================
        // 4. MANEJADOR DEL FORMULARIO
        // =====================================================
        const form = document.getElementById('loginForm');
        const mensajeEl = document.getElementById('mensaje');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value.trim();
            const contrasena = document.getElementById('contrasena').value.trim();

            // Limpiar mensaje anterior
            mensajeEl.className = '';
            mensajeEl.textContent = ' Conectando almas...';

            // Pequeña pausa para dar efecto
            setTimeout(() => {

                // === EJECUTAMOS EL LOGIN VULNERABLE ===
                const usuarioEncontrado = loginVulnerable(usuario, contrasena);

                if (usuarioEncontrado) {
                    // ✅ LOGIN EXITOSO
                    mensajeEl.className = 'success';
                    mensajeEl.innerHTML = `
                        ✅ ¡Bienvenido, <strong>${usuarioEncontrado.nombre}</strong>! 
                        <br><span style="font-size:0.8rem;opacity:0.7;">
                            (ID: ${usuarioEncontrado.id} | Usuario: ${usuarioEncontrado.usuario})
                        </span>
                    `;
                    
                    // Mostrar en consola lo que pasó (para el profesor)
                    console.log('🔓 ACCESO CONCEDIDO - Inyección SQL exitosa');
                    console.log('📝 Usuario ingresado:', usuario);
                    console.log('🔑 Contraseña ingresada:', contrasena);
                    console.log('👤 Usuario encontrado:', usuarioEncontrado);
                    
                } else {
                    // ❌ LOGIN FALLIDO
                    mensajeEl.className = 'error';
                    mensajeEl.textContent = '❌ Usuario o contraseña incorrectos. Intenta de nuevo.';
                    
                    console.log('🚫 ACCESO DENEGADO');
                }

            }, 800);
        });

        // =====================================================
        // 5. MOSTRAR AYUDITA EN CONSOLA (para el estudiante)
        // =====================================================
        console.log('%c💜 LoveAndGhost - Demo SQL Injection 💜', 'font-size:20px; font-weight:bold; color:#8b5cf6;');
        console.log('%c📚 Usuarios registrados:', 'font-weight:bold;');
        baseDeDatos.forEach(u => console.log(`  - ${u.usuario}: ${u.contrasena}`));
        console.log('%c🔴 PRUEBA DE INYECCIÓN: En el campo usuario escribe:  \' OR \'1\'=\'1', 'color:#ff6b6b; font-weight:bold;');
        console.log('%c🔴 Y en contraseña cualquier cosa. ¡Verás que entras como el primer usuario!', 'color:#ff6b6b;');
        console.log('%c⚠️ Esto es SOLO para fines educativos.', 'color:#ffd93d;');

        // =====================================================
        // 6. EFECTO ADICIONAL: Si detectamos inyección, lo mostramos
        // =====================================================
        // Detectamos si el usuario está intentando inyectar
        document.getElementById('usuario').addEventListener('input', function() {
            const val = this.value;
            if (val.includes("'") || val.includes('"') || val.includes('OR') || val.includes('=')) {
                // Cambiamos sutilmente el borde para indicar que estamos en modo "hack"
                this.style.borderColor = '#ff6b6b';
                this.style.boxShadow = '0 0 20px rgba(255, 0, 0, 0.2)';
            } else {
                this.style.borderColor = 'rgba(255,255,255,0.1)';
                this.style.boxShadow = 'none';
            }
        });
    </script>

</body>
</html>
